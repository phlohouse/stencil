name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: deb,rpm,appimage
            artifact_name: stencil-editor-linux
            artifact_glob: |
              editor/src-tauri/target/release/bundle/deb/*.deb
              editor/src-tauri/target/release/bundle/rpm/*.rpm
              editor/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundles: nsis,msi
            artifact_name: stencil-editor-windows
            artifact_glob: |
              editor/src-tauri/target/release/bundle/nsis/*.exe
              editor/src-tauri/target/release/bundle/msi/*.msi
              editor/src-tauri/target/release/stencil-editor.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: editor
        run: npm ci

      - name: Build Tauri app
        working-directory: editor
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
